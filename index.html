<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>くり下がりあり？</title>
<style>
  :root {
    --bg: #f7f7f7;
    --panel: #ffffff;
    --shadow: 0 8px 20px rgba(0,0,0,.10);
    --radius: 16px;
    --card-w: min(92vw, 360px);
    --dark: #111;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    font-family: system-ui, -apple-system, "Noto Sans JP", sans-serif;
    background: var(--bg);
    color: var(--dark);
    touch-action: manipulation;
  }

  .wrap {
    max-width: 920px;
    margin: 0 auto;
    padding: 12px;
  }

  .panel {
    background: var(--panel);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 14px 12px 16px;
    position: relative;
  }

  .titleRow {
    position: relative;
    min-height: 44px;
    margin-bottom: 8px;
  }

  .title {
    font-weight: 950;
    font-size: 22px;
    margin: 0;
    text-align: center;
    line-height: 44px;
  }

  .soundBtn {
    position: absolute;
    right: 0;
    top: 0;
    border: 0;
    border-radius: 14px;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 10px 14px;
    font-size: 15px;
    font-weight: 950;
    cursor: pointer;
    background: #f1f1f1;
    color: var(--dark);
    line-height: 1;
  }

  .soundBtn.off {
    background: #e9e9e9;
    color: #666;
  }

  .soundIcon { font-size: 18px; line-height: 1; }

  .topModes {
    display: flex;
    justify-content: center;
    gap: 10px;
    margin: 4px 0 14px;
  }

  .modeBtn {
    border: 0;
    border-radius: 12px;
    padding: 12px 18px;
    min-width: 110px;
    font-size: 14px;
    font-weight: 900;
    cursor: pointer;
    background: #ececec;
    color: var(--dark);
    transition: background .12s ease, color .12s ease;
    white-space: nowrap;
  }

  .modeBtn.active {
    background: var(--dark);
    color: #fff;
  }

  .modeBtn:disabled { opacity: .55; cursor: not-allowed; }

  .stage { display: flex; justify-content: center; }

  .card {
    background: #fff;
    border-radius: 14px;
    box-shadow: 0 6px 14px rgba(0,0,0,.08);
    padding: 12px;
    position: relative;
    width: var(--card-w);
    overflow: hidden;
    margin: 0 auto;
    min-height: 200px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .card::after {
    content: "";
    position: absolute;
    inset: 10px;
    border-radius: 12px;
    border: 3px solid rgba(0,0,0,.06);
    pointer-events: none;
    z-index: 5;
  }

  .cardInner {
    position: relative;
    z-index: 1;
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .hissanImg {
    max-width: 200px;
    max-height: 170px;
    object-fit: contain;
    display: block;
    filter: drop-shadow(0 4px 8px rgba(0,0,0,.08));
    user-select: none;
    pointer-events: none;
  }

  .messageArea {
    position: absolute;
    inset: 0;
    display: none;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 20px;
    z-index: 10;
    border-radius: 14px;
  }

  .messageArea.show { display: flex; }

  .messageInner {
    background: rgba(255,255,255,.92);
    border-radius: 20px;
    padding: 20px 22px;
    box-shadow: 0 10px 24px rgba(0,0,0,.12);
    min-width: min(260px, 82%);
  }

  .messageTitle {
    font-size: clamp(24px, 7vw, 36px);
    font-weight: 950;
    line-height: 1.25;
    margin: 0;
    white-space: pre-line;
  }

  .messageSub {
    margin: 8px 0 0;
    font-size: 14px;
    font-weight: 800;
    color: #555;
    line-height: 1.6;
    white-space: pre-line;
  }

  .resultResetBtn {
    margin-top: 12px;
    border: 0;
    border-radius: 12px;
    padding: 8px 14px;
    font-size: 13px;
    font-weight: 900;
    cursor: pointer;
    background: #efefef;
    color: var(--dark);
  }

  .resultResetBtn.hidden { display: none; }

  .controls {
    display: flex;
    justify-content: center;
    margin-top: 14px;
  }

  .controls.hidden { display: none; }

  .mainBtn {
    border: 0;
    border-radius: 14px;
    font-weight: 950;
    cursor: pointer;
    padding: 14px 18px;
    font-size: 18px;
    background: var(--dark);
    color: #fff;
    min-width: 170px;
  }

  .mainBtn:disabled { opacity: .55; cursor: not-allowed; }

  /* くり下がりボタン */
  .borrowRow {
    max-width: 430px;
    margin: 14px auto 0;
  }

  .borrowBtn {
    width: 100%;
    border: 0;
    border-radius: 16px;
    background: #333;
    color: #fff;
    font-size: 22px;
    font-weight: 950;
    padding: 18px 24px;
    cursor: pointer;
    box-shadow: 0 6px 14px rgba(0,0,0,.14);
    transition: transform .08s ease, opacity .08s ease;
    letter-spacing: .04em;
  }

  .borrowBtn:active { transform: translateY(1px) scale(.99); }

  .borrowBtn:disabled {
    opacity: .45;
    cursor: not-allowed;
  }

  /* 答えパッド (10〜18) */
  .pad {
    max-width: 430px;
    margin: 10px auto 0;
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
  }

  .answerBtn {
    border: 0;
    border-radius: 16px;
    background: #fff;
    color: var(--dark);
    box-shadow: 0 6px 14px rgba(0,0,0,.08);
    min-height: 74px;
    font-size: 26px;
    font-weight: 950;
    cursor: pointer;
    transition: transform .08s ease, opacity .08s ease;
  }

  .answerBtn:active { transform: translateY(1px) scale(.99); }

  .answerBtn:disabled {
    opacity: .45;
    cursor: not-allowed;
  }

  @keyframes shake {
    0%   { transform: translateX(0); }
    20%  { transform: translateX(-10px); }
    40%  { transform: translateX(10px); }
    60%  { transform: translateX(-8px); }
    80%  { transform: translateX(8px); }
    100% { transform: translateX(0); }
  }
  .shake { animation: shake .22s ease; }

  @keyframes bgCorrect {
    0%   { background: #b6f0b6; }
    60%  { background: #dffadf; }
    100% { background: #fff; }
  }
  .card.bgCorrect { animation: bgCorrect .45s ease; }

  @keyframes bgWrong {
    0%   { background: #ffb3b3; }
    60%  { background: #ffe0e0; }
    100% { background: #fff; }
  }
  .card.bgWrong { animation: bgWrong .45s ease; }

  .starParticle {
    position: absolute;
    font-size: 28px;
    pointer-events: none;
    z-index: 20;
    animation: starFloat .7s ease forwards;
  }
  @keyframes starFloat {
    0%   { opacity: 1; transform: translate(-50%, 0) scale(0.8); }
    40%  { opacity: 1; transform: translate(-50%, -50px) scale(1.3); }
    100% { opacity: 0; transform: translate(-50%, -90px) scale(1); }
  }

  @media (max-width: 560px) {
    .titleRow { min-height: 92px; margin-bottom: 2px; }
    .title { line-height: 1.35; padding-top: 6px; font-size: 20px; }
    .soundBtn { top: 48px; right: 0; font-size: 13px; padding: 8px 10px; }
    .topModes { margin: 0 0 8px; gap: 8px; }
    .modeBtn { min-width: 100px; font-size: 13px; padding: 10px 10px; }
    .hissanImg { max-width: 170px; max-height: 140px; }
    .borrowBtn { font-size: 20px; padding: 14px 20px; }
    .pad { gap: 8px; }
    .answerBtn { min-height: 62px; font-size: 22px; }
    .controls { margin-top: 10px; }
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="panel">
    <div class="titleRow">
      <p class="title">くり下がりあり？</p>
      <button id="soundBtn" class="soundBtn" type="button">
        <span id="soundIcon" class="soundIcon">🔊</span>
        <span id="soundLabel">おと ON</span>
      </button>
    </div>

    <div class="topModes">
      <button id="practiceModeBtn" class="modeBtn active" type="button">れんしゅう</button>
      <button id="challengeModeBtn" class="modeBtn" type="button">30びょう</button>
      <button id="noMissModeBtn" class="modeBtn" type="button">ノーミスモード</button>
    </div>

    <div class="stage">
      <div id="card" class="card">
        <div id="cardInner" class="cardInner">
          <img id="hissanImg" class="hissanImg" src="" alt="筆算の問題" />
        </div>
        <div id="messageArea" class="messageArea">
          <div class="messageInner">
            <p id="messageTitle" class="messageTitle"></p>
            <p id="messageSub" class="messageSub"></p>
            <button id="resultResetBtn" class="resultResetBtn hidden" type="button">ベストきろくを リセット</button>
          </div>
        </div>
      </div>
    </div>

    <div id="controls" class="controls hidden">
      <button id="mainBtn" class="mainBtn" type="button">スタート</button>
    </div>

    <div class="borrowRow">
      <button id="borrowBtn" class="borrowBtn" type="button">くり下がり</button>
    </div>

    <div class="pad" id="pad">
      <button class="answerBtn" type="button" data-answer="10">10</button>
      <button class="answerBtn" type="button" data-answer="11">11</button>
      <button class="answerBtn" type="button" data-answer="12">12</button>
      <button class="answerBtn" type="button" data-answer="13">13</button>
      <button class="answerBtn" type="button" data-answer="14">14</button>
      <button class="answerBtn" type="button" data-answer="15">15</button>
      <button class="answerBtn" type="button" data-answer="16">16</button>
      <button class="answerBtn" type="button" data-answer="17">17</button>
      <button class="answerBtn" type="button" data-answer="18">18</button>
    </div>
  </div>
</div>

<script>
  const IMG_BASE = "./imgs/";

  // 問題リストを生成（被減数19→11、引く数9→1 の順）
  // 答えが10以上 → 繰り下がりなし（数値）、9以下 → 繰り下がりあり（'borrow'）
  const PROBLEMS = [];
  (function() {
    let f = 1;
    for (let m = 19; m >= 11; m--) {
      for (let s = 9; s >= 1; s--) {
        const ans = m - s;
        PROBLEMS.push({ f, a: ans >= 10 ? ans : 'borrow' });
        f++;
      }
    }
  })();

  const STORAGE_SOUND_KEY   = "kuriSagariSoundOn";
  const STORAGE_BEST_30_KEY = "kuriSagariBest30";
  const STORAGE_BEST_NM_KEY = "kuriSagariBestNoMiss";

  // --- デッキ ---
  let deck = [];
  let lastFile = -1;

  function shuffle(arr) {
    for (let i = arr.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
  }

  function buildDeck() {
    const arr = shuffle([...PROBLEMS]);
    if (arr.length > 1 && arr[0].f === lastFile) {
      const j = Math.floor(Math.random() * (arr.length - 1)) + 1;
      [arr[0], arr[j]] = [arr[j], arr[0]];
    }
    return arr;
  }

  function nextProblem() {
    if (deck.length === 0) deck = buildDeck();
    const p = deck.shift();
    lastFile = p.f;
    return p;
  }

  // --- 状態 ---
  const state = {
    mode: "practice",
    current: null,
    locked: false,
    gameRunning: false,
    gameBusy: false,
    score: 0,
    misses: 0,
    best30:     Number(localStorage.getItem(STORAGE_BEST_30_KEY) || 0),
    bestNoMiss: Number(localStorage.getItem(STORAGE_BEST_NM_KEY) || 0),
    soundOn: localStorage.getItem(STORAGE_SOUND_KEY) !== "off",
    timerId: null,
    nextId: null,
    showResetButton: false,
    lastResult: null
  };

  // --- DOM ---
  const soundBtn        = document.getElementById("soundBtn");
  const practiceModeBtn = document.getElementById("practiceModeBtn");
  const challengeModeBtn= document.getElementById("challengeModeBtn");
  const noMissModeBtn   = document.getElementById("noMissModeBtn");
  const controls        = document.getElementById("controls");
  const mainBtn         = document.getElementById("mainBtn");
  const resultResetBtn  = document.getElementById("resultResetBtn");
  const cardInner       = document.getElementById("cardInner");
  const hissanImg       = document.getElementById("hissanImg");
  const messageArea     = document.getElementById("messageArea");
  const messageTitle    = document.getElementById("messageTitle");
  const messageSub      = document.getElementById("messageSub");
  const borrowBtn       = document.getElementById("borrowBtn");
  const answerButtons   = Array.from(document.querySelectorAll(".answerBtn"));
  const card            = document.getElementById("card");

  // --- 音 ---
  let audioCtx = null;
  function getAudioCtx() {
    const Cls = window.AudioContext || window.webkitAudioContext;
    if (!Cls) return null;
    if (!audioCtx) audioCtx = new Cls();
    if (audioCtx.state === "suspended") audioCtx.resume();
    return audioCtx;
  }
  function beep({ freq=880, duration=0.08, type="sine", gain=0.03, when=0 }) {
    if (!state.soundOn) return;
    const ctx = getAudioCtx();
    if (!ctx) return;
    const now = ctx.currentTime + when;
    const osc = ctx.createOscillator();
    const amp = ctx.createGain();
    osc.type = type;
    osc.frequency.setValueAtTime(freq, now);
    amp.gain.setValueAtTime(0.0001, now);
    amp.gain.exponentialRampToValueAtTime(gain, now + 0.01);
    amp.gain.exponentialRampToValueAtTime(0.0001, now + duration);
    osc.connect(amp); amp.connect(ctx.destination);
    osc.start(now); osc.stop(now + duration + 0.02);
  }
  function playCorrect() {
    beep({ freq:880,  duration:0.08, type:"sine",     gain:0.035, when:0 });
    beep({ freq:1320, duration:0.1,  type:"sine",     gain:0.03,  when:0.08 });
  }
  function playWrong() {
    beep({ freq:180,  duration:0.12, type:"triangle", gain:0.03,  when:0 });
  }

  // --- UI ヘルパー ---
  function updateSoundButton() {
    soundBtn.classList.toggle("off", !state.soundOn);
    document.getElementById("soundIcon").textContent  = state.soundOn ? "🔊" : "🔇";
    document.getElementById("soundLabel").textContent = state.soundOn ? "おと ON" : "おと OFF";
  }

  function setAllDisabled(disabled) {
    answerButtons.forEach(b => b.disabled = disabled);
    borrowBtn.disabled = disabled;
  }

  function showProblem() {
    hissanImg.style.visibility = "visible";
    messageArea.classList.remove("show");
  }

  function showMessage(title, sub) {
    hissanImg.style.visibility = "hidden";
    messageArea.classList.add("show");
    messageTitle.textContent = title;
    messageSub.textContent   = sub;
    resultResetBtn.classList.toggle("hidden", !state.showResetButton);
  }

  function shakeCard() {
    cardInner.classList.remove("shake");
    void cardInner.offsetWidth;
    cardInner.classList.add("shake");
  }

  function flashCorrectCard() {
    card.classList.remove("bgCorrect");
    void card.offsetWidth;
    card.classList.add("bgCorrect");
    card.addEventListener("animationend", () => card.classList.remove("bgCorrect"), { once: true });
    spawnStars();
  }

  function flashWrongCard() {
    card.classList.remove("bgWrong");
    void card.offsetWidth;
    card.classList.add("bgWrong");
    card.addEventListener("animationend", () => card.classList.remove("bgWrong"), { once: true });
  }

  function spawnStars() {
    const items = [
      { emoji: "⭐", left: "25%", top: "65%", delay: 0 },
      { emoji: "✨", left: "50%", top: "70%", delay: 0.07 },
      { emoji: "🌟", left: "75%", top: "65%", delay: 0.14 }
    ];
    items.forEach(({ emoji, left, top, delay }) => {
      const el = document.createElement("span");
      el.className = "starParticle";
      el.textContent = emoji;
      el.style.left = left;
      el.style.top  = top;
      el.style.animationDelay = delay + "s";
      card.appendChild(el);
      el.addEventListener("animationend", () => el.remove());
    });
  }

  function setProblem(p) {
    state.current = p;
    hissanImg.src = IMG_BASE + p.f + ".png";
    showProblem();
  }

  function clearTimers() {
    clearTimeout(state.nextId);
    clearInterval(state.timerId);
    state.nextId = null; state.timerId = null;
  }

  function getCurrentBest() {
    if (state.mode === "challenge") return state.best30;
    if (state.mode === "nomiss")    return state.bestNoMiss;
    return 0;
  }
  function setCurrentBest(v) {
    if (state.mode === "challenge") { state.best30 = v; localStorage.setItem(STORAGE_BEST_30_KEY, String(v)); }
    else if (state.mode === "nomiss") { state.bestNoMiss = v; localStorage.setItem(STORAGE_BEST_NM_KEY, String(v)); }
  }
  function clearCurrentBest() {
    if (state.mode === "challenge") { state.best30 = 0; localStorage.removeItem(STORAGE_BEST_30_KEY); }
    else if (state.mode === "nomiss") { state.bestNoMiss = 0; localStorage.removeItem(STORAGE_BEST_NM_KEY); }
  }

  function buildReadyMessage() {
    if (state.mode === "challenge") return { title:"30びょう",        sub:"スタートで はじめるよ" };
    if (state.mode === "nomiss")    return { title:"ノーミス\nモード", sub:"ミスしたら おわり" };
    return { title:"", sub:"" };
  }

  function buildResultMessage(result, isReset=false) {
    const title = `${result.score}もん\nできた！`;
    if (state.mode === "challenge") {
      if (isReset)          return { title, sub:`ミス ${result.misses}かい\nベストきろくを リセットしたよ` };
      if (result.isNewBest) return { title, sub:`ミス ${result.misses}かい\nベスト こうしん！` };
      return                       { title, sub:`ミス ${result.misses}かい\nベスト ${getCurrentBest()}もん` };
    }
    if (state.mode === "nomiss") {
      if (isReset)          return { title, sub:`ミスで しゅうりょう\nベストきろくを リセットしたよ` };
      if (result.isNewBest) return { title, sub:`ミスで しゅうりょう\nベスト こうしん！` };
      return                       { title, sub:`ミスで しゅうりょう\nベスト ${getCurrentBest()}もん` };
    }
    return { title, sub:"" };
  }

  // --- モード制御 ---
  function resetPractice() {
    clearTimers();
    state.gameRunning = false; state.gameBusy = false; state.locked = false;
    state.showResetButton = false; state.lastResult = null;
    controls.classList.add("hidden");
    setAllDisabled(false);
    setProblem(nextProblem());
  }

  function resetGameReady() {
    clearTimers();
    state.gameRunning = false; state.gameBusy = false; state.locked = false;
    state.score = 0; state.misses = 0;
    state.showResetButton = false; state.lastResult = null;
    controls.classList.remove("hidden");
    mainBtn.disabled = false; mainBtn.textContent = "スタート";
    setAllDisabled(true);
    const r = buildReadyMessage();
    showMessage(r.title, r.sub);
  }

  function setMode(mode) {
    clearTimers();
    state.mode = mode;
    practiceModeBtn.classList.toggle("active",  mode === "practice");
    challengeModeBtn.classList.toggle("active", mode === "challenge");
    noMissModeBtn.classList.toggle("active",    mode === "nomiss");
    if (mode === "practice") resetPractice();
    else resetGameReady();
  }

  function endGame() {
    clearTimers();
    state.gameRunning = false; state.gameBusy = false;
    setAllDisabled(true);
    const isNewBest = state.score > getCurrentBest();
    if (isNewBest) setCurrentBest(state.score);
    state.lastResult = { score: state.score, misses: state.misses, isNewBest };
    state.showResetButton = true;
    const r = buildResultMessage(state.lastResult);
    showMessage(r.title, r.sub);
    mainBtn.disabled = false; mainBtn.textContent = "もういちど";
  }

  function startGame() {
    state.gameRunning = true; state.gameBusy = false; state.locked = false;
    state.score = 0; state.misses = 0;
    state.showResetButton = false; state.lastResult = null;
    mainBtn.disabled = true; mainBtn.textContent = "ちょうせん中";
    setAllDisabled(false);
    setProblem(nextProblem());
    if (state.mode === "challenge") {
      const endAt = Date.now() + 30000;
      state.timerId = setInterval(() => { if (Date.now() >= endAt) endGame(); }, 100);
    }
  }

  // --- 回答処理 ---
  function handleAnswer(selected) {
    if (state.mode === "practice" && state.locked) return;
    if (state.mode !== "practice" && (!state.gameRunning || state.gameBusy)) return;

    const isCorrect = (selected === state.current.a);

    if (state.mode === "practice") {
      state.locked = true; setAllDisabled(true);
    } else {
      state.gameBusy = true; setAllDisabled(true);
    }

    if (isCorrect) {
      if (state.mode !== "practice") state.score++;
      flashCorrectCard();
      playCorrect();
      const delay = state.mode === "practice" ? 300 : 200;
      state.nextId = setTimeout(() => {
        if (state.mode === "practice") {
          state.locked = false;
        } else {
          if (!state.gameRunning) return;
          state.gameBusy = false;
        }
        setAllDisabled(false);
        setProblem(nextProblem());
      }, delay);
    } else {
      shakeCard();
      flashWrongCard();
      playWrong();
      if (state.mode === "challenge") {
        state.misses++;
        state.nextId = setTimeout(() => {
          if (!state.gameRunning) return;
          state.gameBusy = false; setAllDisabled(false);
        }, 250);
      } else if (state.mode === "nomiss") {
        state.nextId = setTimeout(() => endGame(), 250);
      } else {
        state.nextId = setTimeout(() => {
          state.locked = false; setAllDisabled(false);
        }, 250);
      }
    }
  }

  // --- イベント ---
  answerButtons.forEach(btn => {
    btn.addEventListener("click", () => handleAnswer(Number(btn.dataset.answer)));
  });

  borrowBtn.addEventListener("click", () => handleAnswer('borrow'));

  mainBtn.addEventListener("click", () => {
    if (state.mode !== "practice" && !state.gameRunning) startGame();
  });

  practiceModeBtn.addEventListener("click",  () => { if (state.mode !== "practice")  setMode("practice");  });
  challengeModeBtn.addEventListener("click", () => { if (state.mode !== "challenge") setMode("challenge"); });
  noMissModeBtn.addEventListener("click",    () => { if (state.mode !== "nomiss")    setMode("nomiss");    });

  soundBtn.addEventListener("click", () => {
    state.soundOn = !state.soundOn;
    localStorage.setItem(STORAGE_SOUND_KEY, state.soundOn ? "on" : "off");
    updateSoundButton();
  });

  resultResetBtn.addEventListener("click", () => {
    clearCurrentBest();
    state.showResetButton = false;
    if (!state.lastResult) return;
    const r = buildResultMessage(state.lastResult, true);
    showMessage(r.title, r.sub);
  });

  // --- 初期化 ---
  updateSoundButton();
  setMode("practice");
</script>
</body>
</html>
